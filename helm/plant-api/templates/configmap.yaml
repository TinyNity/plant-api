apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "plant-api.fullname" . }}-config
  labels:
    {{- include "plant-api.labels" . | nindent 4 }}
data:
  QUARKUS_DATASOURCE_JDBC_URL: "jdbc:postgresql://{{ .Values.database.host }}:{{ .Values.database.port }}/{{ .Values.database.name }}"
  QUARKUS_DATASOURCE_USERNAME: "{{ .Values.database.username }}"