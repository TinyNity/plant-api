version: "3.9"

services:
  plant-api:
    ports:
      - "8080:8080"
    environment:
      - QUARKUS_PROFILE=dev

  db:
    ports:
      - "5432:5432"

  db-test:
    image: postgres:16
    container_name: plant-db-test
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=${DB_NAME:-plante_db}
      - POSTGRES_USER=${DB_USER:-my_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-my_super_password}