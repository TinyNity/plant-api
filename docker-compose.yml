services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://db:5432/${DB_NAME:-plante_db}
      - QUARKUS_DATASOURCE_USERNAME=${DB_USER:-my_user}
      - QUARKUS_DATASOURCE_PASSWORD=${DB_PASSWORD:-my_super_password}
    depends_on:
      - db

  db:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${DB_NAME:-plante_db}
      - POSTGRES_USER=${DB_USER:-my_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-my_super_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  db-test:
    image: postgres:16
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=plante_db
      - POSTGRES_USER=my_user
      - POSTGRES_PASSWORD=my_super_password

volumes:
  postgres_data:
