quarkus.http.port=5555
quarkus.smallrye-openapi.auto-add-open-api-endpoint = true
quarkus.datasource.db-kind=postgresql
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/plante_db
%dev.quarkus.datasource.username=my_user
%dev.quarkus.datasource.password=my_super_password
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://plant-db:5432/plante_db
%prod.quarkus.datasource.username=my_user
%prod.quarkus.datasource.password=my_super_password

%test.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5433/plante_db
%test.quarkus.datasource.username=my_user
%test.quarkus.datasource.password=my_super_password
%test.mp.jwt.verify.issuer=https://xmobilite.com/issuer
%test.mp.jwt.verify.publickey.location=publicKey.pem
%test.smallrye.jwt.sign.key.location=privateKey.pem
%dev.mp.jwt.verify.issuer=https://xmobilite.com/issuer
%dev.mp.jwt.verify.publickey.location=publicKey.pem
%dev.smallrye.jwt.sign.key.location=privateKey.pem
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.schema-management.strategy=none
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
%test.quarkus.flyway.clean-at-start=true

%dev.quarkus.hibernate-orm.dev-ui.allow-hql=true
%dev.plante.dev-seeder.default-user-count=12
%dev.plante.dev-seeder.default-homes-per-user=2
%dev.plante.dev-seeder.default-additional-members-per-home=2
%dev.plante.dev-seeder.default-rooms-per-home=3
%dev.plante.dev-seeder.default-plants-per-room=6
%dev.plante.dev-seeder.default-logs-per-plant=4
%dev.plante.dev-seeder.default-user-password=Password123!

mp.jwt.verify.publickey.location=publicKey.pem
smallrye.jwt.sign.key.location=privateKey.pem
