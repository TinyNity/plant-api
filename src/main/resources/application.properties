quarkus.smallrye-openapi.auto-add-open-api-endpoint = true
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${POSTGRES_USER:my_user}
quarkus.datasource.password=${POSTGRES_PASSWORD:my_super_password}
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/${POSTGRES_DB:plante_db}
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/${POSTGRES_DB:plante_db}
%dev.quarkus.datasource.username=${POSTGRES_USER:my_user}
%dev.quarkus.datasource.password=${POSTGRES_PASSWORD:my_super_password}
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/${POSTGRES_DB:plante_db}
%prod.quarkus.datasource.username=${POSTGRES_USER:my_user}
%prod.quarkus.datasource.password=${POSTGRES_PASSWORD:my_super_password}
%test.quarkus.datasource.db-kind=postgresql
%test.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/${POSTGRES_DB:plante_db}
%test.quarkus.datasource.username=${POSTGRES_USER:my_user}
%test.quarkus.datasource.password=${POSTGRES_PASSWORD:my_super_password}

quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.schema-management.strategy=none

# Dťsactiver l'import.sql, Flyway gŤre tout via V1.3
quarkus.hibernate-orm.sql-load-script=no-file

quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true

# Configuration pour nettoyer la base de donnťes avant les tests
%test.quarkus.flyway.clean-at-start=true

%dev.quarkus.hibernate-orm.dev-ui.allow-hql=true

smallrye.jwt.sign.key.location=privateKey.pem
mp.jwt.verify.publickey.location=publicKey.pem
mp.jwt.verify.issuer=https://xmobilite.com/issuer

# …couter sur toutes les interfaces rťseau (pour accŤs mobile)
quarkus.http.host=0.0.0.0

# Configuration spťcifique pour le mode DEV (accŤs mobile)
%dev.quarkus.http.host=0.0.0.0
%dev.quarkus.http.cors=true
%dev.quarkus.http.cors.origins=*
# Autoriser l'IP locale pour le Dev UI et les requÍtes (utilise la variable DEV_HOST ou localhost par dťfaut)
%dev.quarkus.dev-ui.hosts=${DEV_HOST:localhost},localhost,127.0.0.1
