# Configuration de la base de données
quarkus.datasource.db-kind=postgresql

# Pour utiliser Dev Services (Docker), il ne faut PAS définir l'URL.
# Quarkus démarrera automatiquement un conteneur PostgreSQL.
# quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/projetplante

# Credentials (Dev Services utilisera ces valeurs pour configurer le conteneur)
quarkus.datasource.username=postgres
quarkus.datasource.password=postgres

# Configuration explicite de Dev Services
quarkus.datasource.devservices.enabled=true

# Configuration Hibernate
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.log.sql=true

# Configuration spécifique pour les tests
%test.quarkus.hibernate-orm.database.generation=drop-and-create
