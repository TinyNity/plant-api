quarkus.smallrye-openapi.auto-add-open-api-endpoint = true
quarkus.datasource.db-kind=postgresql
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/plante_db
%dev.quarkus.datasource.username=my_user
%dev.quarkus.datasource.password=my_super_password
%prod.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/plante_db
%prod.quarkus.datasource.username=my_user
%prod.quarkus.datasource.password=my_super_password

%test.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5433/plante_db
%test.quarkus.datasource.username=my_user
%test.quarkus.datasource.password=my_super_password
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.schema-management.strategy=none
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
%test.quarkus.flyway.clean-at-start=true


%dev.quarkus.hibernate-orm.dev-ui.allow-hql=true

mp.jwt.verify.publickey.location=publicKey.pem
smallrye.jwt.sign.key.location=privateKey.pem
