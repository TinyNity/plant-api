name: CI - Tests

on:
  workflow_run:
    workflows: [ "CI - SAST Analysis" ]
    branches: [ "master" ]
    types:
      - completed

jobs:
  tests:
    name: Run Tests
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Generate JWT key pair for test run
        shell: bash
        run: |
          openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out src/main/resources/privateKey.pem
          openssl rsa -pubout -in src/main/resources/privateKey.pem -out src/main/resources/publicKey.pem

      - name: Run tests and generate coverage report
        shell: bash
        run: |
          chmod +x mvnw
          ./mvnw verify
        continue-on-error: false

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco
          retention-days: 30