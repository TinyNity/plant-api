name: Build and Deploy

on:
  workflow_run:
    workflows: [ "CI - Tests and SAST Analysis" ]
    branches: [ "master" ]
    types:
      - completed

jobs:
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Inject private key for build
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: |
          test -n "$PRIVATE_KEY"
          printf '%s\n' "$PRIVATE_KEY" > src/main/resources/privateKey.pem
          chmod 600 src/main/resources/privateKey.pem

      - name: Generate Javadoc
        run: |
          chmod +x mvnw
          ./mvnw javadoc:javadoc -DskipTests

      - name: Generate OpenAPI specification
        run: |
          ./mvnw package -DskipTests -Dquarkus.smallrye-openapi.store-schema-directory=target/openapi
          mkdir -p openapi-specs
          find target -type f \( -name "openapi.yaml" -o -name "openapi.json" \) -exec cp {} openapi-specs/ \;
          test -n "$(ls -A openapi-specs)"

      - name: Upload Javadoc artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: javadoc-report
          path: target/reports/apidocs
          retention-days: 30

      - name: Upload OpenAPI artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: openapi-specs
          retention-days: 30

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Build image
        run: docker build --pull -t ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/plant-api:latest .
      - name: Push image
        run: docker push ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/plant-api:latest

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          port: ${{ secrets.SSH_PORT }}
          host: nity.me
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.CAN_SSH_PRV_KEY }}
          script: |
            cd /srv/plant/ProjetPlante
            docker compose pull
            docker compose up -d
            docker compose logs --tail=50