name: Build and Deploy

on:
  workflow_run:
    workflows: [ "CI - Tests and SAST Analysis" ]
    branches: [ "master" ]
    types:
      - completed

jobs:
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
      - name: Lowercase owner name
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: Build image
        run: docker build --pull -t ghcr.io/${{ env.OWNER }}/plant-api:latest .
      - name: Push image
        run: docker push ghcr.io/${{ env.OWNER }}/plant-api:latest

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          port: ${{ secrets.SSH_PORT }}
          host: nity.me
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.CAN_SSH_PRV_KEY }}
          script: |
            cd /srv/plant/ProjetPlante
            docker compose pull
            docker compose up -d
            docker compose logs --tail=50