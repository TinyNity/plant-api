stages:
  - build
  - deploy

variables:
  IMAGE_TAG: $DOCKER_USER/plant-api:latest

build:
  stage: build
  image:
    name: https://registry.gitlab.com/gitlab-org/cluster-integration/auto-build-image:v1.40.0
    entrypoint: [""]
  tags:
    - k8s-etu
  script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"https://index.docker.io/v1/\":{\"username\":\"$DOCKER_USER\",\"password\":\"$DOCKER_PAT\"}}}" > /kaniko/.docker/config.json

    - /kaniko/executor \
        --context $CI_PROJECT_DIR \
        --dockerfile $CI_PROJECT_DIR/Dockerfile \
        --destination $IMAGE_TAG

#! ----------------------------------

deploy:
  stage: deploy
  image: alpine:latest
  tags:
    - k8s-etu

  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$CAN_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts

  script:
    - |
      ssh $SSH_USER@$SSH_HOST << 'EOF'
        cd /srv/plant/ProjetPlante
        docker compose pull
        docker compose up -d
      EOF