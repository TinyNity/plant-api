stages:
  - build
  - deploy

variables:
  CI_REGISTRY: gitlab.univ-artois.fr
  CI_REGISTRY_IMAGE: $CI_REGISTRY/cameron_delsol/ProjetPlante
  IMAGE_TAG: $CI_REGISTRY_IMAGE:latest

build:
  stage: build
  image: docker:24
  tags:
    - k8s-etu

  services:
    - name: docker:24-dind
      command: ["--tls=false"]

  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""

  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u "$CI_REGISTRY_USER" --password-stdin
    - docker build -t $IMAGE_TAG .
    - docker push $IMAGE_TAG

#! ––––––––––––––––––––––––

deploy:
  stage: deploy
  image: alpine:latest
  tags: 
    - k8s-etu
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$CAN_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H $SSH_HOST >> ~/.ssh/known_hosts
  script:
    - |
      ssh $SSH_USER@$SSH_HOST << 'EOF'
        cd /srv/plant/ProjetPlante
        docker compose pull
        docker compose up -d
      EOF